<body>

<header>
  <div class="container nav">
    <h2 class="logo">Health<span>Life</span></h2>

    <nav>
      <a href="index.html" data-en="Home" data-ar="الرئيسية">Home</a>
      <a href="services.html" data-en="Other Services" data-ar="خدمات اخرى">Other Services</a>

</header>

<section class="page container">

  <h1 data-en="Blood Test Report"
      data-ar="تقرير تحليل الدم">
    Blood Test Report
  </h1>

  
  <div style="display:flex; justify-content:flex-end; margin-bottom:20px;">
    <img src="images/lab1.jpeg"
         alt="Blood Test"
         style="max-width:300px; border-radius:12px;">
  </div>

  
  <div class="report-box"
       style="background:#f9fbfd; padding:20px; border-radius:12px;">
    <p id="typingText"
       style="white-space:pre-line; font-size:16px; line-height:1.8;">
    </p>
  </div>

</section>


<script src="js/script.js"></script>

<script>
const reportText = {
  en: `
The Complete Blood Count (CBC) is one of the most important medical tests.

• Red Blood Cells (RBC):
  Carry oxygen to all body organs.

• White Blood Cells (WBC):
  Help your body fight infections.

• Hemoglobin (Hb):
  Measures the oxygen-carrying capacity of blood.

• Platelets:
  Essential for blood clotting.

⚠️ Abnormal results may indicate anemia, infection, or inflammation.
Always consult your doctor for interpretation.
`,
  ar: `
تحليل صورة الدم الكاملة (CBC) من أهم التحاليل الطبية.

• كرات الدم الحمراء:
  مسؤولة عن نقل الأكسجين إلى أعضاء الجسم.

• كرات الدم البيضاء:
  تساعد الجسم على مقاومة العدوى.

• الهيموجلوبين:
  يقيس قدرة الدم على حمل الأكسجين.

• الصفائح الدموية:
  ضرورية لعملية تجلط الدم.

⚠️ القيم غير الطبيعية قد تشير إلى أنيميا أو عدوى أو التهابات.
يُفضل استشارة الطبيب لتفسير النتائج.
`
};

const target = document.getElementById("typingText");
let charIndex = 0;
let typingInterval = null;

function startTyping() {
  if (!target) return;

  clearInterval(typingInterval);
  target.textContent = "";
  charIndex = 0;

  const text = reportText[lang];

  typingInterval = setInterval(() => {
    target.textContent += text.charAt(charIndex);
    charIndex++;

    if (charIndex >= text.length) {
      clearInterval(typingInterval);
    }
  }, 30);
}

// أول ما الصفحة تفتح
window.addEventListener("load", startTyping);

// نراقب تغيّر اللغة
let lastLang = lang;
setInterval(() => {
  if (lang !== lastLang) {
    lastLang = lang;
    startTyping();
  }
}, 200);
</script>


</body>
</html>
