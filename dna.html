    <nav>

      <a href="services.html" data-en="Other Services" data-ar="خدمات اخرى">Other Services</a>

<section class="page dna-page">

  <div class="container report-layout">

    <!-- النص -->
    <div class="report-text">
      <h1 data-en="DNA Test Report" data-ar="تقرير تحليل DNA">
        DNA Test Report
      </h1>

      <pre id="typingText" class="typing-box"></pre>
    </div>

    <div class="report-image">
      <img src="images/lab2.jpeg" alt="DNA Test">
    </div>

  </div>

</section>

<script src="js/script.js"></script>

<script>
/* =====================
   DNA Live Typing Report
===================== */

const reportText = {
  en: `
DNA testing helps analyze your genetic information to detect inherited conditions
and understand your genetic health risks.

• Genetic Disorders:
  Helps identify inherited diseases early.

• Family Health History:
  Useful for understanding diseases passed through generations.

• Personalized Medicine:
  Assists doctors in choosing the most effective treatment.

• Disease Prevention:
  Early awareness allows preventive healthcare plans.

⚠️ DNA test results are for medical guidance only.
Always consult a specialist for accurate diagnosis.
`,
  ar: `
تحليل DNA يساعد في دراسة المعلومات الوراثية
لاكتشاف الأمراض الوراثية وفهم المخاطر الصحية الجينية.

• الأمراض الوراثية:
  يساعد في اكتشاف الأمراض الموروثة مبكرًا.

• التاريخ الصحي للعائلة:
  مفيد لفهم الأمراض المنتقلة بين الأجيال.

• الطب الشخصي:
  يساعد الأطباء في اختيار العلاج الأنسب.

• الوقاية من الأمراض:
  الاكتشاف المبكر يساعد على وضع خطة وقائية.

⚠️ نتائج تحليل DNA إرشادية فقط.
ويجب استشارة الطبيب المختص للتشخيص الدقيق.
`
};

const target = document.getElementById("typingText");
let charIndex = 0;
let typingInterval = null;

function startTyping() {
  if (!target) return;

  clearInterval(typingInterval);
  target.textContent = "";
  charIndex = 0;

  const text = reportText[lang];

  typingInterval = setInterval(() => {
    target.textContent += text.charAt(charIndex);
    charIndex++;

    if (charIndex >= text.length) {
      clearInterval(typingInterval);
    }
  }, 30);
}

// أول ما الصفحة تفتح
window.addEventListener("load", startTyping);

// متابعة تغيير اللغة
let lastLang = lang;
setInterval(() => {
  if (lang !== lastLang) {
    lastLang = lang;
    startTyping();
  }
}, 200);
</script>

</body>
</html>
